<!doctype html>
<html>

<head>
	<meta charset="UTF-8" />
	<meta http-equiv="Content-Style-Type" content="text/css" />
	<meta http-equiv="Content-Script-Type" content="text/javascript" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0, viewport-fit=cover" />

	<!-- Favicon -->
	<link rel="icon" type="image/png" sizes="32x32" href="./favicon/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="./favicon/favicon-16x16.png">
	<link rel="mask-icon" href="./favicon/safari-pinned-tab.svg" color="#5bbad5">
	<link rel="shortcut icon" href="./favicon/favicon.ico">
	<meta name="msapplication-TileColor" content="#da532c">
	<meta name="msapplication-config" content="./favicon/browserconfig.xml">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-title" content="Kindolphin">
	<!-- No <meta name="theme-color"> here on purpose. Even with a
	     non-matching media attribute, its mere presence in the document
	     puts iOS Safari into "tint from meta" mode and disables the
	     live observer that useThemeColorAnchor's strips depend on, so
	     theme switches in browser mode would freeze the URL-bar tint
	     on the old color. Instead the FOUC script below INJECTS the
	     meta dynamically only when display-mode is standalone (where
	     the live observer is moot anyway and theme-color is the actual
	     mechanism for the notch / status-bar background). appSettings
	     keeps that injected meta in sync on theme changes.
	     apple-mobile-web-app-status-bar-style is also deliberately
	     omitted: "default" forces an opaque white system bar in
	     standalone that caps theme-color tinting to a thin strip
	     below it. -->

	<!-- OGP, Site Description -->
	<meta name="keywords" content="%VITE_OG_KEYWORDS%" />
	<meta name="description" content="%VITE_OG_DESCRIPTION%" />

	<meta property="og:url" content="%VITE_OG_URL%" />
	<meta property="og:type" content="website" />
	<meta property="og:title" content="%VITE_OG_TITLE%" />
	<meta property="og:site_name" content="%VITE_OG_TITLE%" />
	<meta property="og:description" content="%VITE_OG_DESCRIPTION%" />
	<meta property="og:image" content="%VITE_OG_URL%%VITE_OG_IMAGE%" />
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:site" content="%VITE_OG_TWITTER%" />
	<meta name="twitter:player" content="%VITE_OG_TWITTER%" />
	<meta name="twitter:creator" content="%VITE_OG_TWITTER%" />
	<meta name="twitter:title" content="%VITE_OG_TITLE%" />
	<meta name="twitter:description" content="%VITE_OG_DESCRIPTION%" />
	<meta name="twitter:image" content="%VITE_OG_URL%%VITE_OG_IMAGE%" />

	<!-- Fetch Priority -->
	<link rel="preload" href="./assets/splash_ramp.webp" as="image" fetchpriority="high" />
	<link rel="preload" href="./assets/kindle_ish_tree.webp" as="image" fetchpriority="high" />
	<link rel="preload" href="./assets/cover_happening.png" as="image" fetchpriority="high" />
	<link rel="preload" href="./assets/cover_happening_en.png" as="image" fetchpriority="high" />
	<link rel="preload" href="./assets/cover_happy.webp" as="image" fetchpriority="high" />
	<link rel="preload" href="./assets/icons/help.gif" as="image" fetchpriority="high" />
	<link rel="preload" href="./assets/icons/house.gif" as="image" fetchpriority="high" />
	<link rel="preload" href="./assets/icons/lang.gif" as="image" fetchpriority="high" />
	<link rel="preload" href="./assets/icons/palette.gif" as="image" fetchpriority="high" />
	<link rel="preload" href="./assets/icons/share.gif" as="image" fetchpriority="high" />
	<link rel="preload" href="./assets/icons/install.gif" as="image" fetchpriority="high" />
	<link rel="preload" href="./assets/icons/listen.gif" as="image" fetchpriority="high" />
	<link rel="preload" href="./assets/icons/sound_sprite.gif" as="image" fetchpriority="high" />
	<link rel="preload" href="./assets/play_wobble.webp" as="image" fetchpriority="low" />
	<link rel="preload" href="./assets/alert.webp" as="image" fetchpriority="low" />

	<!-- CSS -->
	<link rel="stylesheet" href="./assets/fontawesome/all.min.css" />
	<link rel="stylesheet" href="./src/style.styl" />

	<title>Kindolphin : GIF Manga Reader by AC-bu</title>

	<script>
		const cssVars = JSON.parse(localStorage.getItem('jp.g-a-l.happening.cssVars') || '{}')
		const invert = JSON.parse(localStorage.getItem('jp.g-a-l.happening.invert') || 'false')

		const html = document.documentElement
		for (const key in cssVars) {
			html.style.setProperty(key, cssVars[key])
		}

		html.classList.toggle('invert', invert)
		html.style.setProperty('--black', invert ? 'white' : 'black')
		html.style.setProperty('--white', invert ? 'black' : 'white')

		// Set <html lang> synchronously so style.styl's `:root[lang=ja]`
		// / `:root[lang=en]` rules can hide the inactive language from
		// the very first paint. Without this the bilingual <p lang="ja">
		// / <p lang="en"> blocks (e.g. PaneHelp) would briefly render
		// both languages between page load and Vue mount.
		const langRaw = localStorage.getItem('jp.g-a-l.happening.lang')
		html.lang = langRaw
			? JSON.parse(langRaw)
			: navigator.language === 'ja' ? 'ja' : 'en'

		// Inject <meta name="theme-color"> ONLY in standalone PWA mode.
		// In Safari browser mode we leave it off so the live observer
		// driving useThemeColorAnchor's strips stays active (see the
		// note above the apple-mobile-web-app-* metas). In standalone
		// mode the live observer is irrelevant and theme-color is the
		// actual mechanism iOS uses for the notch / status-bar bg.
		if (
			window.matchMedia &&
			window.matchMedia('(display-mode: standalone)').matches &&
			cssVars['--theme-bg']
		) {
			const meta = document.createElement('meta')
			meta.setAttribute('name', 'theme-color')
			meta.setAttribute('content', cssVars['--theme-bg'])
			document.head.appendChild(meta)
		}
	</script>
	
</head>

<body>
	<div id="app">

	</div>
	<div id="splash">
		<div class="splash">
			<div class="ramp img"></div>
			<div class="loading-text"><span>Kindolphin<span></div>
			<img class="kindle-ish-tree" src="./assets/kindle_ish_tree.webp" />
		</div>
		<!-- Order matters: ink-overlay paints first (bottom), bg-overlay
		     paints last (top). The composited result is the same either
		     way (lighten + darken with these specific colors collapses
		     to bg), but iOS Safari 16+ samples the topmost RAW layer
		     color when tinting the URL/status/tab bar -- so the topmost
		     overlay must be bg-colored to keep the chrome bg-tinted. -->
		<div class="ink-overlay"></div>
		<div class="bg-overlay"></div>
	</div>
	<script type="module" src="./src/index.ts"></script>
</body>

</html>
